<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ejercicios sin video — TGWL Admin</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/glassmorphism.css">
  <link rel="stylesheet" href="../css/fonts.css">
  <style>
    body {
      font-family: 'SF Pro Text', system-ui, sans-serif;
      background: var(--color-bg, #0A0A0A);
      color: var(--color-text, #F0F0F0);
      margin: 0;
      padding: 32px 20px;
      min-height: 100vh;
    }
    .wrap { max-width: 880px; margin: 0 auto; }
    h1 {
      font-family: 'SF Pro Display', system-ui, sans-serif;
      font-size: 26px; font-weight: 600; margin: 0 0 6px;
    }
    .subtitle {
      color: var(--color-text-tertiary, #8A8A8A);
      font-size: 13px; margin-bottom: 20px;
    }
    .stats {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .stat {
      flex: 1; min-width: 140px;
      padding: 14px 16px;
      background: var(--color-background-primary, rgba(255,255,255,0.04));
      border: 0.5px solid var(--color-border-tertiary, rgba(255,255,255,0.10));
      border-radius: var(--r-md, 14px);
    }
    .stat-label {
      font-size: 11px; font-weight: 500;
      color: var(--color-text-tertiary, #8A8A8A);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .stat-value {
      font-family: 'SF Pro Display', system-ui, sans-serif;
      font-size: 24px; font-weight: 600;
    }
    .stat-value.bad   { color: #C10801; }
    .stat-value.good  { color: #4ade80; }
    .search-row {
      display: flex; gap: 10px; margin-bottom: 18px;
    }
    .search-input {
      flex: 1;
      padding: 10px 14px;
      background: var(--color-background-primary, rgba(255,255,255,0.05));
      border: 0.5px solid var(--color-border-secondary, rgba(255,255,255,0.18));
      border-radius: var(--r-sm, 8px);
      color: var(--color-text, #F0F0F0);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .search-input:focus { border-color: var(--red, #C10801); }
    .copy-btn {
      padding: 10px 16px;
      background: transparent;
      border: 0.5px solid var(--color-border-secondary, rgba(255,255,255,0.18));
      border-radius: var(--r-sm, 8px);
      color: var(--color-text, #F0F0F0);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all .15s;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.04); border-color: var(--red, #C10801); }
    .group {
      margin-bottom: 18px;
      background: var(--color-background-primary, rgba(255,255,255,0.04));
      border: 0.5px solid var(--color-border-tertiary, rgba(255,255,255,0.10));
      border-radius: var(--r-md, 14px);
      overflow: hidden;
    }
    .group-header {
      padding: 12px 16px;
      font-size: 12px; font-weight: 600;
      color: var(--color-text-tertiary, #8A8A8A);
      text-transform: uppercase; letter-spacing: 0.06em;
      border-bottom: 0.5px solid var(--color-border-tertiary, rgba(255,255,255,0.10));
      display: flex; justify-content: space-between; align-items: center;
    }
    .group-count {
      font-family: 'SF Pro Display', system-ui, sans-serif;
      font-size: 14px; font-weight: 600;
      color: var(--color-text, #F0F0F0);
    }
    .ex-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px;
      border-bottom: 0.5px solid var(--color-border-tertiary, rgba(255,255,255,0.06));
      transition: background .15s;
      cursor: pointer;
    }
    .ex-row:last-child { border-bottom: none; }
    .ex-row:hover { background: rgba(255,255,255,0.03); }
    .ex-row .name {
      flex: 1; min-width: 0;
      font-size: 14px; font-weight: 500;
      color: var(--color-text-primary, var(--color-text));
    }
    .ex-row .badge {
      font-size: 10px; font-weight: 600;
      padding: 3px 8px;
      border-radius: var(--r-sm, 8px);
      background: rgba(193, 8, 1, 0.12);
      color: #ff5b50;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .ex-row .copy-hint {
      font-size: 11px; color: var(--color-text-tertiary, #8A8A8A);
      opacity: 0; transition: opacity .15s;
    }
    .ex-row:hover .copy-hint { opacity: 1; }
    .ex-row.copied .copy-hint { opacity: 1; color: #4ade80; }
    .empty {
      padding: 40px;
      text-align: center;
      color: var(--color-text-tertiary, #8A8A8A);
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--color-text-tertiary, #8A8A8A);
      text-decoration: none; font-size: 13px;
      margin-bottom: 18px;
    }
    .back-link:hover { color: var(--color-text, #F0F0F0); }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back-link" href="../admin.html">← Panel admin</a>

    <h1>Ejercicios sin video local</h1>
    <p class="subtitle">Lista de ejercicios donde falta el campo <code>localVideo</code> en <code>data.js</code></p>

    <div class="stats" id="stats"></div>

    <div class="search-row">
      <input type="text" id="search" class="search-input" placeholder="Buscar por nombre…">
      <button class="copy-btn" id="copy-all">Copiar todos</button>
    </div>

    <div id="list"></div>
  </div>

  <script type="module">
    import { EXERCISES } from '../data/data.js';

    const total   = EXERCISES.length;
    const missing = EXERCISES.filter(e => !e.localVideo);
    const withV   = total - missing.length;

    // Stats
    document.getElementById('stats').innerHTML = `
      <div class="stat">
        <div class="stat-label">Total ejercicios</div>
        <div class="stat-value">${total}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Con video local</div>
        <div class="stat-value good">${withV}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Faltan video</div>
        <div class="stat-value bad">${missing.length}</div>
      </div>
    `;

    function render(filter = '') {
      const q = filter.trim().toLowerCase();
      const filtered = q
        ? missing.filter(e => (e.n || '').toLowerCase().includes(q) || (e.m || '').toLowerCase().includes(q))
        : missing;

      // Group by muscle
      const byMuscle = {};
      filtered.forEach(e => {
        const m = e.m || 'Sin grupo';
        if (!byMuscle[m]) byMuscle[m] = [];
        byMuscle[m].push(e);
      });

      const listEl = document.getElementById('list');
      const groups = Object.keys(byMuscle).sort();
      if (!groups.length) {
        listEl.innerHTML = '<div class="empty">Sin resultados</div>';
        return;
      }

      listEl.innerHTML = groups.map(m => `
        <div class="group">
          <div class="group-header">
            <span>${m}</span>
            <span class="group-count">${byMuscle[m].length}</span>
          </div>
          ${byMuscle[m].map(e => `
            <div class="ex-row" data-name="${e.n.replace(/"/g,'&quot;')}">
              <span class="name">${e.n}</span>
              <span class="badge">${e.t === 'c' ? 'Comp' : 'Aislado'}</span>
              <span class="copy-hint">Toca para copiar</span>
            </div>
          `).join('')}
        </div>
      `).join('');

      // Click row → copy name
      listEl.querySelectorAll('.ex-row').forEach(row => {
        row.addEventListener('click', async () => {
          const name = row.dataset.name;
          try {
            await navigator.clipboard.writeText(name);
            row.classList.add('copied');
            const hint = row.querySelector('.copy-hint');
            if (hint) hint.textContent = '✓ Copiado';
            setTimeout(() => {
              row.classList.remove('copied');
              if (hint) hint.textContent = 'Toca para copiar';
            }, 1500);
          } catch (_) {}
        });
      });
    }

    render();

    // Search
    document.getElementById('search').addEventListener('input', e => render(e.target.value));

    // Copy all
    document.getElementById('copy-all').addEventListener('click', async () => {
      const text = missing.map(e => `${e.m || ''}\t${e.n}`).join('\n');
      try {
        await navigator.clipboard.writeText(text);
        const btn = document.getElementById('copy-all');
        const old = btn.textContent;
        btn.textContent = '✓ Copiado';
        setTimeout(() => { btn.textContent = old; }, 1500);
      } catch (_) {}
    });
  </script>
</body>
</html>
